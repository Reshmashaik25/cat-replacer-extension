<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cat Replacer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
    }

    #replaceBtn {
      background-color: #ff69b4; /* hot pink */
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    #replaceBtn:hover {
      background-color: #ff85c1; /* lighter pink on hover */
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cat Replacer</h1>
    <p>Everything is better with cats!</p>
    <button id="replaceBtn">Meow Now!</button>
  </div>

  <!-- Backend script will hook into this button -->
  <script src="popup.js"></script>
</body>
</html>
